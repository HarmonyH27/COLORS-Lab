name: Test Code Base

on:
  push:
    branches: [ "testing--colorslab" ]
  pull_request:
    branches: [ "testing--colorslab" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
         node-version: '20'
      - name: Install Dependencies
        run: npm install
      - name: run test
        run: npm test

